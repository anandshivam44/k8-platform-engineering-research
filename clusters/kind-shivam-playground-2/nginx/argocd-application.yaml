apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kind-shivam-playground-2.nginx
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/anandshivam44/platform-engineering-research.git
      targetRevision: main
      ref: values
    - repoURL: https://charts.bitnami.com/bitnami
      chart: nginx
      targetRevision: "22.5.3"
      helm:
        valueFiles:
          - $values/clusters/kind-shivam-playground-2/nginx/values.yaml
          - $values/clusters/kind-shivam-playground-2/nginx/overrides.yaml
  destination:
    server: https://172.18.0.3:6443
    namespace: nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
